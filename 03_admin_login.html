<!DOCTYPE html>

<html class="dark" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>PadelPro Admin Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#00e677",
                        "background-light": "#f5f8f7",
                        "background-dark": "#0f1117",
                        "card-dark": "#1a1d2e",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
        }
        .grid-pattern {
            background-image: radial-gradient(circle at 1px 1px, rgba(0, 230, 119, 0.05) 1px, transparent 0);
            background-size: 40px 40px;
        }
        .glow-bottom {
            background: radial-gradient(circle at 50% 100%, rgba(0, 230, 119, 0.15) 0%, transparent 50%);
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen flex flex-col font-display overflow-hidden relative">
<!-- Background Elements -->
<div class="absolute inset-0 grid-pattern pointer-events-none"></div>
<div class="absolute inset-0 glow-bottom pointer-events-none"></div>
<div class="relative flex min-h-screen w-full flex-col items-center justify-center p-4">
<!-- Logo Section Above Card -->
<a class="flex items-center gap-3 mb-8" href="01_landing_hero.html">
<div class="size-10 bg-primary/20 rounded-lg flex items-center justify-center text-primary">
<span class="material-symbols-outlined text-3xl">sports_tennis</span>
</div>
<h1 class="text-2xl font-black tracking-tight text-slate-900 dark:text-white uppercase">Padel<span class="text-primary">Pro</span></h1>
</a>
<!-- Login Card -->
<div class="w-full max-w-md bg-white dark:bg-card-dark rounded-xl border border-slate-200 dark:border-slate-800 shadow-2xl p-8 z-10">
<div class="mb-8">
<h2 class="text-2xl font-bold text-slate-900 dark:text-white leading-tight">Acceso Administrador</h2>
<p class="text-slate-500 dark:text-slate-400 mt-1">Panel de control del club</p>
</div>
<form action="#" class="space-y-6">
<!-- Email Field -->
<div class="flex flex-col gap-2">
<label class="text-sm font-medium text-slate-700 dark:text-slate-300">Correo electrónico</label>
<div class="relative">
<input class="w-full bg-slate-50 dark:bg-slate-900/50 border border-slate-200 dark:border-slate-700 rounded-lg h-12 px-4 text-slate-900 dark:text-white placeholder:text-slate-400 dark:placeholder:text-slate-600 focus:ring-2 focus:ring-primary/50 focus:border-primary outline-none transition-all" placeholder="ejemplo@padelpro.com" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="flex flex-col gap-2">
<label class="text-sm font-medium text-slate-700 dark:text-slate-300">Contraseña</label>
<div class="relative">
<input class="w-full bg-slate-50 dark:bg-slate-900/50 border border-slate-200 dark:border-slate-700 rounded-lg h-12 px-4 pr-12 text-slate-900 dark:text-white placeholder:text-slate-400 dark:placeholder:text-slate-600 focus:ring-2 focus:ring-primary/50 focus:border-primary outline-none transition-all" placeholder="••••••••" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined text-xl">visibility</span>
</button>
</div>
</div>
<!-- Options Row -->
<div class="flex items-center justify-between py-2">
<label class="flex items-center gap-2 cursor-pointer group">
<div class="relative flex items-center">
<input class="peer h-5 w-5 rounded border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-900 text-primary focus:ring-0 focus:ring-offset-0 transition-all cursor-pointer" type="checkbox"/>
</div>
<span class="text-sm text-slate-600 dark:text-slate-400 group-hover:text-slate-900 dark:group-hover:text-slate-200 transition-colors">Recordarme</span>
</label>
<a class="text-sm font-semibold text-primary hover:text-primary/80 transition-colors" href="#">¿Olvidaste tu contraseña?</a>
</div>
<!-- Submit Button -->
<button class="w-full bg-primary hover:bg-primary/90 text-background-dark font-bold h-12 rounded-lg transition-all transform active:scale-[0.98] shadow-lg shadow-primary/20" type="submit" onclick="window.location.href='04_dashboard_kpis.html'; return false;">
                    Iniciar sesión
                </button>
</form>
</div>
<!-- Footer -->
<div class="mt-8 text-center">
<p class="text-sm text-slate-500 dark:text-slate-500">
                ¿Necesitas acceso? <a class="text-primary hover:underline font-medium" href="#">Contacta con soporte</a>
</p>
</div>
<!-- Language Selector (Small) -->
<div class="fixed bottom-6 right-6">
<button class="flex items-center gap-2 px-3 py-1.5 rounded-full bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 text-xs font-medium text-slate-600 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-700 transition-colors">
<span class="material-symbols-outlined text-lg">language</span>
<span>Español</span>
<span class="material-symbols-outlined text-base">expand_more</span>
</button>
</div>
</div>
</body></html>
